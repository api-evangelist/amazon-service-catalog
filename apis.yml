apis:
- aid: amazon-service-catalog:aws-service-catalog-api
  name: AWS Service Catalog API
  description: >-
    The AWS Service Catalog API provides programmatic access to create and
    manage portfolios, products, provisioning artifacts, constraints, and
    service actions for IT service governance and self-service provisioning.
