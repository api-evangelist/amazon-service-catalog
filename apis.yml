aid: amazon-service-catalog
name: Amazon Service Catalog
description: >-
  AWS Service Catalog enables organizations to create and manage catalogs of
  IT services that are approved for use on AWS. IT administrators can create
  and manage a portfolio of products (services, applications, and others) and
  control which users have access to which products.
