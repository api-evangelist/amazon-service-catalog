naftiko: 1.0.0-alpha2
info:
  label: Amazon Service Catalog IT Service Governance
  description: Unified capability for IT service governance including portfolio management, product catalog curation, and
    self-service product provisioning. Used by IT Administrators and End Users.
  tags:
  - Amazon Service Catalog
  - IT Governance
  - Cloud Governance
  - Self-Service
  - Compliance
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: amazon-service-catalog
    baseUri: https://servicecatalog.us-east-1.amazonaws.com
    description: Amazon Service Catalog REST API
    authentication:
      type: apikey
      key: Authorization
      value: AWS4-HMAC-SHA256 Credential={{AWS_ACCESS_KEY_ID}}
      placement: header
    resources:
    - name: portfolios
      path: /portfolios
      description: Portfolio management operations
      operations:
      - name: list-portfolios
        method: GET
        description: Lists all portfolios in the account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-portfolio
        method: POST
        description: Creates a portfolio
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-portfolio
        method: GET
        description: Gets information about a portfolio
        inputParameters:
        - name: PortfolioId
          in: path
          type: string
          required: true
          description: The portfolio identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-portfolio
        method: DELETE
        description: Deletes a portfolio
        inputParameters:
        - name: PortfolioId
          in: path
          type: string
          required: true
          description: The portfolio identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: products
      path: /products
      description: Product management operations
      operations:
      - name: search-products
        method: GET
        description: Gets information about products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-product
        method: POST
        description: Creates a product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: provisioned-products
      path: /provisioned-products
      description: Provisioned product management
      operations:
      - name: provision-product
        method: POST
        description: Provisions a product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-provisioned-product
        method: GET
        description: Gets information about a provisioned product
        inputParameters:
        - name: ProvisionedProductId
          in: path
          type: string
          required: true
          description: The provisioned product identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: terminate-provisioned-product
        method: DELETE
        description: Terminates a provisioned product
        inputParameters:
        - name: ProvisionedProductId
          in: path
          type: string
          required: true
          description: The provisioned product identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: it-service-governance-api
    description: Unified REST API for Amazon Service Catalog IT service governance.
    resources:
    - path: /v1/portfolios
      name: portfolios
      description: IT service portfolio management
      operations:
      - method: GET
        name: list-portfolios
        description: List all IT service portfolios
        call: amazon-service-catalog.list-portfolios
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-portfolio
        description: Create an IT service portfolio
        call: amazon-service-catalog.create-portfolio
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products
      name: products
      description: Approved product catalog
      operations:
      - method: GET
        name: search-products
        description: Browse approved products
        call: amazon-service-catalog.search-products
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-product
        description: Add a product to the catalog
        call: amazon-service-catalog.create-product
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/provisioned-products
      name: provisioned-products
      description: Self-service product provisioning
      operations:
      - method: POST
        name: provision-product
        description: Provision an approved product
        call: amazon-service-catalog.provision-product
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: it-service-governance-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Service Catalog IT service governance.
    tools:
    - name: list-portfolios
      description: List all IT service catalog portfolios
      hints:
        readOnly: true
        idempotent: true
      call: amazon-service-catalog.list-portfolios
      outputParameters:
      - type: object
        mapping: $.
    - name: create-portfolio
      description: Create a new IT service catalog portfolio
      hints:
        readOnly: false
        idempotent: false
      call: amazon-service-catalog.create-portfolio
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-portfolio
      description: Get details about an IT service portfolio
      hints:
        readOnly: true
        idempotent: true
      call: amazon-service-catalog.describe-portfolio
      outputParameters:
      - type: object
        mapping: $.
    - name: search-products
      description: Browse and search approved IT products
      hints:
        readOnly: true
        idempotent: true
      call: amazon-service-catalog.search-products
      outputParameters:
      - type: object
        mapping: $.
    - name: create-product
      description: Add a new product to the IT service catalog
      hints:
        readOnly: false
        idempotent: false
      call: amazon-service-catalog.create-product
      outputParameters:
      - type: object
        mapping: $.
    - name: provision-product
      description: Self-service provision an approved IT product
      hints:
        readOnly: false
        idempotent: false
      call: amazon-service-catalog.provision-product
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-provisioned-product
      description: Check the status of a provisioned product
      hints:
        readOnly: true
        idempotent: true
      call: amazon-service-catalog.describe-provisioned-product
      outputParameters:
      - type: object
        mapping: $.
    - name: terminate-provisioned-product
      description: Terminate and decommission a provisioned product
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amazon-service-catalog.terminate-provisioned-product
      outputParameters:
      - type: object
        mapping: $.
